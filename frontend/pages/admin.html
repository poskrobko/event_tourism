<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Админ панель</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body class="container py-4">
<h3 class="section-title">Админ-панель</h3>
<div class="row g-3">
  <div class="col-md-6">
    <h5>Создать локацию</h5>
    <input id="city" class="form-control mb-2" placeholder="Город">
    <input id="address" class="form-control mb-2" placeholder="Адрес">
    <button class="btn btn-primary" onclick="createLocation()">Создать</button>
  </div>
  <div class="col-md-6">
    <h5>Создать событие</h5>
    <input id="title" class="form-control mb-2" placeholder="Название">
    <input id="description" class="form-control mb-2" placeholder="Описание">
    <input id="eventDate" class="form-control mb-2" type="date">
    <input id="basePrice" class="form-control mb-2" type="number" placeholder="Базовая цена">
    <input id="locationId" class="form-control mb-2" type="number" placeholder="ID локации">
    <button class="btn btn-primary" onclick="createEvent()">Создать</button>
  </div>
</div>
<div id="msg" class="feedback mt-3"></div>
<script src="../js/api.js"></script>
<script src="../js/main.js"></script>
<script>
async function createLocation() {
  try {
    const l = await request('/admin/locations', { method: 'POST', body: JSON.stringify({ city: city.value, address: address.value }) });
    showMessage('msg', 'Локация создана с id=' + l.id);
  } catch (e) { showMessage('msg', e.message, true); }
}

async function createEvent() {
  try {
    const e = await request('/admin/events', {
      method: 'POST',
      body: JSON.stringify({ title: title.value, description: description.value, eventDate: eventDate.value, basePrice: +basePrice.value, locationId: +locationId.value })
    });
    showMessage('msg', 'Событие создано с id=' + e.id);
  } catch (e) { showMessage('msg', e.message, true); }
}
</script>
</body>
</html>
