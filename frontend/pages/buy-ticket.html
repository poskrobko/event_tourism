<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Покупка билета</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body class="container py-5" style="max-width: 600px;">
<h3 class="section-title">Покупка билета</h3>
<input id="amount" type="number" value="1" min="1" class="form-control my-2" placeholder="Количество">
<button class="btn btn-primary w-100" onclick="buy()">Оплатить</button>
<div id="msg" class="feedback mt-2"></div>
<script src="../js/api.js"></script>
<script src="../js/main.js"></script>
<script>
const ticketId = +new URLSearchParams(location.search).get('ticketId');
async function buy() {
  try {
    const res = await request('/user/tickets/buy', {
      method: 'POST',
      body: JSON.stringify({ ticketId, amount: +amount.value })
    });
    showMessage('msg', `Заказ #${res.id} успешно создан`);
  } catch (e) { showMessage('msg', e.message, true); }
}
</script>
</body>
</html>
