<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Детали события</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body class="container py-4">
<a href="events.html" class="btn btn-light mb-3">← Назад</a>
<div id="content"></div>
<script src="../js/api.js"></script>
<script>
const id = new URLSearchParams(location.search).get('id');

async function loadDetails() {
  const d = await request('/public/events/' + id);
  content.innerHTML = `
    <h2 class="section-title">${d.event.title}</h2>
    <p>${d.event.description}</p>
    <p><b>Адрес:</b> ${d.event.city}, ${d.event.address}</p>
    <p><a href="${d.event.mapUrl}" target="_blank">Открыть на карте</a> | <a href="${d.calendarMockUrl}" target="_blank">Добавить в Google Calendar</a></p>
    <h5>Программа</h5>
    <ul>${d.program.map(p => `<li>${p.startTime} — ${p.activity}</li>`).join('')}</ul>
    <h5>Билеты</h5>
    <div class="row">${d.tickets.map(t => `<div class='col-md-4'><div class='card p-2 mb-2'>${t.category}: ${t.price} ₽<br>Осталось: ${t.quantity}<br><a href='buy-ticket.html?ticketId=${t.id}' class='btn btn-primary btn-sm mt-2'>Купить</a></div></div>`).join('')}</div>
  `;
}
loadDetails();
</script>
</body>
</html>
