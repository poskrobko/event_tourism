<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Список событий</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Event Tourism</a>
    <div>
      <a class="btn btn-light btn-sm" href="profile.html">Профиль</a>
      <a class="btn btn-light btn-sm" href="admin.html">Админ</a>
      <button class="btn btn-outline-light btn-sm" onclick="logout()">Выход</button>
    </div>
  </div>
</nav>
<div class="container py-4">
  <h2 class="section-title">Мероприятия</h2>
  <div class="row g-2 mb-3">
    <div class="col-md-3"><input id="fDate" class="form-control" type="date"></div>
    <div class="col-md-3"><input id="fCity" class="form-control" placeholder="Город"></div>
    <div class="col-md-3"><input id="fPrice" class="form-control" type="number" placeholder="Макс. цена"></div>
    <div class="col-md-3"><button class="btn btn-primary w-100" onclick="loadEvents()">Фильтровать</button></div>
  </div>
  <div id="events" class="row g-3"></div>
</div>
<script src="../js/api.js"></script>
<script src="../js/main.js"></script>
<script>
async function loadEvents() {
  const params = new URLSearchParams();
  if (fDate.value) params.append('date', fDate.value);
  if (fCity.value) params.append('city', fCity.value);
  if (fPrice.value) params.append('maxPrice', fPrice.value);

  const data = await request('/public/events?' + params.toString());
  events.innerHTML = data.content.map(e => `
    <div class="col-md-4">
      <div class="card card-event h-100">
        <div class="card-body">
          <span class="badge badge-custom mb-2">${e.city}</span>
          <h5>${e.title}</h5>
          <p>${e.description.substring(0, 80)}...</p>
          <p><b>${e.eventDate}</b> · от ${e.basePrice}₽</p>
          <a class="btn btn-primary btn-sm" href="event-details.html?id=${e.id}">Подробнее</a>
        </div>
      </div>
    </div>`).join('');
}
loadEvents();
</script>
</body>
</html>
