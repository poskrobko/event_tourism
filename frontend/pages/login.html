<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login / Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
<div class="container py-5" style="max-width: 680px;">
  <h2 class="section-title mb-4">Event Tourism: Вход и регистрация</h2>
  <div class="row g-4">
    <div class="col-md-6">
      <h5>Вход</h5>
      <input id="loginEmail" class="form-control mb-2" placeholder="Email">
      <input id="loginPassword" class="form-control mb-2" type="password" placeholder="Пароль">
      <button class="btn btn-primary w-100" onclick="login()">Войти</button>
    </div>
    <div class="col-md-6">
      <h5>Регистрация</h5>
      <input id="regName" class="form-control mb-2" placeholder="Имя">
      <input id="regEmail" class="form-control mb-2" placeholder="Email">
      <input id="regPassword" class="form-control mb-2" type="password" placeholder="Пароль">
      <button class="btn btn-accent w-100" onclick="registerUser()">Зарегистрироваться</button>
    </div>
  </div>
  <div id="authMessage" class="feedback mt-3"></div>
</div>
<script src="../js/api.js"></script>
<script src="../js/main.js"></script>
<script>
async function login() {
  try {
    const data = await request('/auth/login', {
      method: 'POST',
      body: JSON.stringify({
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPassword').value
      })
    });
    localStorage.setItem('token', data.token);
    localStorage.setItem('role', data.role);
    window.location.href = '/frontend/pages/events.html';
  } catch (e) { showMessage('authMessage', e.message, true); }
}

async function registerUser() {
  try {
    await request('/auth/register', {
      method: 'POST',
      body: JSON.stringify({
        fullName: document.getElementById('regName').value,
        email: document.getElementById('regEmail').value,
        password: document.getElementById('regPassword').value
      })
    });
    showMessage('authMessage', 'Регистрация успешна. Теперь войдите.');
  } catch (e) { showMessage('authMessage', e.message, true); }
}
</script>
</body>
</html>
