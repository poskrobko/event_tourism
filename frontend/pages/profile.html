<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Профиль</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body class="container py-4">
<h3 class="section-title">Мои билеты и история заказов</h3>
<div id="orders"></div>
<script src="../js/api.js"></script>
<script>
async function loadOrders() {
  const data = await request('/user/orders');
  orders.innerHTML = data.map(o => `<div class='card p-2 mb-2'>Заказ #${o.id}: ${o.eventTitle}, ${o.amount} шт, ${o.totalPrice} ₽ (${o.status})</div>`).join('');
}
loadOrders();
</script>
</body>
</html>
