<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Tourism</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Event Tourism</div>
    <nav id="main-nav" class="nav"></nav>
  </header>

  <main id="app" class="container"></main>

  <template id="auth-template">
    <section class="grid-2 card">
      <div>
        <h2>Вход</h2>
        <form id="login-form" class="form">
          <label>Email <input type="email" name="email" required /></label>
          <label>Пароль <input type="password" name="password" required minlength="4" /></label>
          <button class="btn primary" type="submit">Войти</button>
        </form>
      </div>
      <div>
        <h2>Регистрация</h2>
        <form id="register-form" class="form">
          <label>Имя <input type="text" name="name" required /></label>
          <label>Email <input type="email" name="email" required /></label>
          <label>Пароль <input type="password" name="password" required minlength="4" /></label>
          <button class="btn accent" type="submit">Создать аккаунт</button>
        </form>
        <hr />
        <h3>Восстановление пароля (мок)</h3>
        <form id="recover-form" class="form inline">
          <input type="email" name="email" required placeholder="Email" />
          <button class="btn" type="submit">Отправить ссылку</button>
        </form>
      </div>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
